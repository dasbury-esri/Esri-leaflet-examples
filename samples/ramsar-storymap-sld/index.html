<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ramsar StoryMap Wetlands Explorer</title>
    <script>
      (function () {
        var path = window.location.pathname || "/";
        var basePath = path.endsWith("/") ? path : path + "/";
        document.write('<base href="' + basePath + '">');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="map-shell">
      <div id="map" class="map" aria-label="Ramsar wetlands map"></div>

      <div class="left-rail">
        <aside id="dock-panel" class="dock-panel dock-panel--hidden" aria-label="Selected wetland details" aria-live="polite">
          <div class="dock-panel__header">
            <p class="dock-panel__label">Selected Site</p>
            <button id="dock-panel-close" class="dock-panel__close" type="button" aria-label="Close selected site details">
              Close
            </button>
          </div>
          <div id="dock-panel-content" class="dock-panel__content"></div>
        </aside>

        <section class="map-overlay" aria-label="Search control">
          <p class="overlay-title">Ramsar Wetlands Explorer</p>
          <div class="search-shell">
            <input
              id="search-input"
              class="search-input"
              type="search"
              placeholder="Search site or country"
              autocomplete="off"
            />
            <button id="reset-view" class="button" type="button">Reset</button>
          </div>
          <div id="search-results" class="results" aria-live="polite"></div>
          <p id="status-text" class="status-text">Loading map configuration…</p>
          <p id="counts-status" class="counts-status">Spatial data counts: loading...</p>
        </section>
      </div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/esri-leaflet@3.0.19/dist/esri-leaflet.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/esri-leaflet-vector@4.3.2/dist/esri-leaflet-vector.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="./config.js"></script>
    <script>
      (function () {
        function loadScript(src, onComplete) {
          var script = document.createElement("script");
          script.src = src;
          script.onload = function () {
            onComplete();
          };
          script.onerror = function () {
            onComplete();
          };
          document.body.appendChild(script);
        }

        function loadApp() {
          loadScript("./app.js", function () {});
        }

        var isLocalHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        if (!isLocalHost) {
          loadApp();
          return;
        }

        fetch("./config.local.js", { method: "HEAD", cache: "no-store" })
          .then(function (response) {
            if (response.ok) {
              loadScript("./config.local.js", loadApp);
            } else {
              loadApp();
            }
          })
          .catch(function () {
            loadApp();
          });
      })();
    </script>
  </body>
</html>
